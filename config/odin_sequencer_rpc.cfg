[server]
debug_mode = 1
http_port  = 8888
http_addr  = 127.0.0.1
static_path = ./static
adapters   = odin_sequencer, dummy_context

[tornado]
logging = debug

[adapter.odin_sequencer]
module = odin_sequencer.adapter.CommandSequenceManagerAdapter
sequence_location = examples/rpc/sequences
enable_rpc = true
rpc_addr = 127.0.0.1
rpc_ctrl_port = 5555
rpc_log_port = 6666

[adapter.dummy_context]
module = odin_sequencer.dummy_context.DummyContextAdapter
